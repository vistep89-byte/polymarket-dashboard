<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Strategy Tester</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 2rem 1rem; }
.container { max-width: 960px; margin: 0 auto; }
h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; }
.card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e5e5e5; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
label strong { color: #1a1a1a; }
select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }
input[type=range] { width: 100%; accent-color: #5856d6; }
button { width: 100%; padding: 12px; background: #5856d6; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
button:hover { background: #4a49c0; }
button:disabled { background: #aaa; cursor: not-allowed; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 1rem; }
.stat { background: #f8f8f8; border-radius: 8px; padding: 1rem; text-align: center; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 600; }
.positive { color: #22c55e; }
.negative { color: #ef4444; }
.neutral { color: #1a1a1a; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 12px; text-align: left; font-weight: 500; color: #888; border-bottom: 1px solid #eee; background: #fafafa; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.badge-up { background: #dcfce7; color: #16a34a; }
.badge-down { background: #fee2e2; color: #dc2626; }
.badge-win { background: #dcfce7; color: #16a34a; }
.badge-loss { background: #fee2e2; color: #dc2626; }
.error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 1rem; font-size: 14px; }
.info { background: #eff6ff; color: #1d4ed8; padding: 10px 12px; border-radius: 8px; margin-bottom: 1rem; font-size: 13px; }
.loading { text-align: center; padding: 2rem; color: #888; }
#results { display: none; }
</style>
</head>
<body>
<div class="container">
<h1>Polymarket Strategy Tester</h1>

<div class="card">
  <div class="grid4" style="margin-bottom: 1rem;">
    <div>
      <label>Актив</label>
      <select id="asset">
        <option value="btc">BTC</option>
        <option value="eth">ETH</option>
        <option value="sol">SOL</option>
        <option value="xrp">XRP</option>
      </select>
    </div>
    <div>
      <label>Таймфрейм</label>
      <select id="timeframe">
        <option value="5m">5m</option>
        <option value="15m">15m</option>
      </select>
    </div>
    <div>
      <label>Макс. вікон</label>
      <select id="limit">
        <option value="100">100</option>
        <option value="200" selected>200</option>
        <option value="500">500</option>
        <option value="1000">1000</option>
      </select>
    </div>
    <div>
      <label>Напрямок</label>
      <select id="direction">
        <option value="any">Будь-який (дешевший)</option>
        <option value="follow">Follow BTC</option>
        <option value="contrarian">Contrarian</option>
      </select>
    </div>
  </div>

  <div class="grid2" style="margin-bottom: 1rem;">
    <div>
      <label>Мін. ціна входу: <strong id="emin-v">0.75</strong></label>
      <input type="range" id="emin" min="0.50" max="0.95" step="0.05" value="0.75">
    </div>
    <div>
      <label>Макс. ціна входу: <strong id="emax-v">0.85</strong></label>
      <input type="range" id="emax" min="0.55" max="0.99" step="0.05" value="0.85">
    </div>
    <div>
      <label>Час від (sec to close): <strong id="tmin-v">0</strong>s</label>
      <input type="range" id="tmin" min="0" max="250" step="10" value="0">
    </div>
    <div>
      <label>Час до (sec to close): <strong id="tmax-v">300</strong>s</label>
      <input type="range" id="tmax" min="30" max="300" step="10" value="300">
    </div>
    <div>
      <label>Мін. delta %: <strong id="delta-v">0.00</strong>%</label>
      <input type="range" id="delta" min="0" max="0.20" step="0.01" value="0">
    </div>
    <div>
      <label>Ставка: <strong id="pos-v">$20</strong></label>
      <input type="range" id="pos" min="5" max="100" step="5" value="20">
    </div>
  </div>

  <button id="run-btn" onclick="runAnalysis()">Запустити аналіз</button>
</div>

<div id="error-msg" class="error" style="display:none;"></div>
<div id="info-msg" class="info" style="display:none;"></div>
<div id="loading" class="loading" style="display:none;"></div>

<div id="results">
  <div class="card">
    <div class="stats">
      <div class="stat"><div class="stat-label">Трейдів</div><div class="stat-value neutral" id="s-trades">—</div></div>
      <div class="stat"><div class="stat-label">Win rate</div><div class="stat-value neutral" id="s-wr">—</div></div>
      <div class="stat"><div class="stat-label">Total PnL</div><div class="stat-value" id="s-pnl">—</div></div>
      <div class="stat"><div class="stat-label">Avg PnL</div><div class="stat-value" id="s-avg">—</div></div>
      <div class="stat"><div class="stat-label">Avg entry</div><div class="stat-value neutral" id="s-entry">—</div></div>
      <div class="stat"><div class="stat-label">EV/dollar</div><div class="stat-value" id="s-ev">—</div></div>
    </div>
  </div>

  <div class="card" style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>Час (UTC)</th>
          <th>Сторона</th>
          <th>Entry</th>
          <th>Результат</th>
          <th style="text-align:right">PnL</th>
        </tr>
      </thead>
      <tbody id="trades-body"></tbody>
    </table>
  </div>
</div>
</div>

<script>
const SUPABASE_URL = 'https://nteqbaiuindiumdnkbsc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50ZXFiYWl1aW5kaXVtZG5rYnNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjI5NTUsImV4cCI6MjA5MTI5ODk1NX0.dsavxNCSZhJTvd1pa--W9D_myB1esbiaah-umGeWmXU';
const PAGE_SIZE = 1000;

const sliders = [
  ['emin','emin-v', v=>v], ['emax','emax-v', v=>v],
  ['tmin','tmin-v', v=>v+'s'], ['tmax','tmax-v', v=>v+'s'],
  ['delta','delta-v', v=>parseFloat(v).toFixed(2)+'%'],
  ['pos','pos-v', v=>'$'+v]
];
sliders.forEach(([id,out,fmt]) => {
  document.getElementById(id).addEventListener('input', e => {
    document.getElementById(out).textContent = fmt(e.target.value);
  });
});

async function fetchAllRows(asset, timeframe) {
  const rows = [];
  let offset = 0;
  while (true) {
    const url = `${SUPABASE_URL}/rest/v1/market_snapshots` +
      `?select=window_ts,seconds_to_close,up_ask,down_ask,delta_pct,predicted_direction,final_direction` +
      `&asset=eq.${asset}&timeframe=eq.${timeframe}&final_direction=not.is.null` +
      `&order=window_ts.desc`;
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Range': `${offset}-${offset + PAGE_SIZE - 1}`,
        'Range-Unit': 'items',
        'Prefer': 'count=none'
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const batch = await res.json();
    if (!batch.length) break;
    rows.push(...batch);
    setLoading(`Завантажено ${rows.length} рядків...`);
    if (batch.length < PAGE_SIZE) break;
    offset += PAGE_SIZE;
    if (offset > 200000) break;
  }
  return rows;
}

function processRows(rows, params) {
  const { emin, emax, tmin, tmax, minDelta, direction, limit } = params;
  const windowMap = new Map();

  for (const r of rows) {
    const stc = parseInt(r.seconds_to_close) || 0;
    const upA = parseFloat(r.up_ask) || 0;
    const downA = parseFloat(r.down_ask) || 0;
    const delta = Math.abs(parseFloat(r.delta_pct) || 0);

    if (stc < tmin || stc > tmax) continue;
    if (delta < minDelta) continue;
    if (!r.final_direction) continue;

    let side = null, price = null;
    const pred = r.predicted_direction;

    if (direction === 'follow') {
      if (pred === 'up' && upA >= emin && upA <= emax) { side = 'up'; price = upA; }
      else if (pred === 'down' && downA >= emin && downA <= emax) { side = 'down'; price = downA; }
    } else if (direction === 'contrarian') {
      if (pred === 'down' && upA >= emin && upA <= emax) { side = 'up'; price = upA; }
      else if (pred === 'up' && downA >= emin && downA <= emax) { side = 'down'; price = downA; }
    } else {
      const upOk = upA >= emin && upA <= emax;
      const downOk = downA >= emin && downA <= emax;
      if (upOk && downOk) { side = upA <= downA ? 'up' : 'down'; price = side === 'up' ? upA : downA; }
      else if (upOk) { side = 'up'; price = upA; }
      else if (downOk) { side = 'down'; price = downA; }
    }
    if (!side || !price) continue;

    const wts = r.window_ts;
    const existing = windowMap.get(wts);
    if (!existing || stc > existing.stc) {
      windowMap.set(wts, { wts, stc, side, price, final: r.final_direction });
    }
  }

  return [...windowMap.values()]
    .sort((a, b) => b.wts - a.wts)
    .slice(0, limit);
}

async function runAnalysis() {
  const asset = document.getElementById('asset').value;
  const timeframe = document.getElementById('timeframe').value;
  const limit = parseInt(document.getElementById('limit').value);
  const direction = document.getElementById('direction').value;
  const emin = parseFloat(document.getElementById('emin').value);
  const emax = parseFloat(document.getElementById('emax').value);
  const tmin = parseInt(document.getElementById('tmin').value);
  const tmax = parseInt(document.getElementById('tmax').value);
  const minDelta = parseFloat(document.getElementById('delta').value);
  const position = parseFloat(document.getElementById('pos').value);

  if (emin >= emax) { showError('Мін. ціна має бути менша за макс.'); return; }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('info-msg').style.display = 'none';
  document.getElementById('run-btn').disabled = true;
  setLoading('Завантаження даних...');

  try {
    const rows = await fetchAllRows(asset, timeframe);
    setLoading(`Обробка ${rows.length} рядків...`);

    const trades = processRows(rows, { emin, emax, tmin, tmax, minDelta, direction, limit });

    if (!trades.length) {
      showError('Не знайдено трейдів з такими параметрами. Спробуй розширити діапазон ціни або часу.');
      return;
    }

    let wins = 0, totalPnl = 0;
    const tradeRows = [];
    for (const t of trades) {
      const won = t.side === t.final;
      if (won) wins++;
      const pnl = won ? position * (1 / t.price - 1) : -position;
      totalPnl += pnl;
      const dt = new Date(t.wts * 1000);
      const timeStr = dt.toISOString().slice(5, 16).replace('T', ' ');
      tradeRows.push({ timeStr, side: t.side, price: t.price, won, pnl });
    }

    const total = trades.length;
    const wr = wins / total;
    const avgEntry = trades.reduce((s, t) => s + t.price, 0) / total;
    const payoff = 1 / avgEntry - 1;
    const ev = wr * payoff - (1 - wr);
    const avgPnl = totalPnl / total;

    document.getElementById('s-trades').textContent = total;
    document.getElementById('s-wr').textContent = (wr * 100).toFixed(1) + '%';
    setColored('s-pnl', (totalPnl >= 0 ? '+' : '') + '$' + totalPnl.toFixed(2), totalPnl >= 0);
    setColored('s-avg', (avgPnl >= 0 ? '+' : '') + '$' + avgPnl.toFixed(2), avgPnl >= 0);
    document.getElementById('s-entry').textContent = avgEntry.toFixed(4);
    setColored('s-ev', (ev >= 0 ? '+' : '') + ev.toFixed(4), ev >= 0);

    if (total < limit) {
      showInfo(`Знайдено ${total} трейдів з ${rows.length} рядків даних. Всі доступні вікна враховано.`);
    }

    const tbody = document.getElementById('trades-body');
    tbody.innerHTML = '';
    for (const t of tradeRows) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:#888">${t.timeStr}</td>
        <td><span class="badge badge-${t.side}">${t.side.toUpperCase()}</span></td>
        <td>${t.price.toFixed(3)}</td>
        <td><span class="badge badge-${t.won ? 'win' : 'loss'}">${t.won ? 'WIN' : 'LOSS'}</span></td>
        <td style="text-align:right;font-weight:500;color:${t.pnl >= 0 ? '#22c55e' : '#ef4444'}">
          ${t.pnl >= 0 ? '+' : ''}$${t.pnl.toFixed(2)}
        </td>`;
      tbody.appendChild(tr);
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';

  } catch (err) {
    showError('Помилка: ' + err.message);
  }
  document.getElementById('run-btn').disabled = false;
}

function setLoading(msg) {
  document.getElementById('loading').textContent = msg;
}
function setColored(id, text, positive) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'stat-value ' + (positive ? 'positive' : 'negative');
}
function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('run-btn').disabled = false;
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function showInfo(msg) {
  const el = document.getElementById('info-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
